<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="flex h-screen">
      <!-- SIDEBAR -->
      <div class="w-64 bg-blue-900 text-white">
        <div class="p-5 text-xl font-bold">Admin</div>

        <nav class="mt-4">
          <a class="flex items-center gap-3 px-5 py-3 hover:bg-blue-800">
            🏠 Dashboard
          </a>

          <a class="flex items-center gap-3 px-5 py-3 bg-blue-800">
            🎓 Mahasiswa
          </a>
        </nav>
      </div>

      <!-- CONTENT -->
      <div class="flex-1 flex flex-col">
        <!-- HEADER -->
        <div
          class="bg-white shadow px-6 py-4 flex justify-between items-center"
        >
          <h1 class="text-xl font-semibold">Mahasiswa</h1>

          <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
        </div>

        <!-- MAIN -->
        <div class="p-6 flex-1">
          <div class="bg-white rounded-lg shadow p-5">
            <div class="flex justify-between items-center mb-4">
              <h2 class="font-semibold text-lg">Daftar Mahasiswa</h2>

              <button
                onclick="openModal()"
                class="bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-800"
              >
                + Tambah Mahasiswa
              </button>
            </div>

            <!-- TABLE -->
            <table class="w-full">
              <thead class="bg-blue-800 text-white">
                <tr>
                  <th class="p-3 text-left">NIM</th>
                  <th class="p-3 text-left">Nama</th>
                  <th class="p-3 text-left">Aksi</th>
                </tr>
              </thead>

              <tbody>
                <tr class="border-b">
                  <td class="p-3">20211002</td>
                  <td class="p-3">Adi</td>
                  <td class="p-3 space-x-2">
                    <button class="bg-yellow-500 text-white px-3 py-1 rounded">
                      Edit
                    </button>
                    <button class="bg-red-600 text-white px-3 py-1 rounded">
                      Hapus
                    </button>
                  </td>
                </tr>

                <tr class="border-b">
                  <td class="p-3">20211003</td>
                  <td class="p-3">gibran</td>
                  <td class="p-3 space-x-2">
                    <button class="bg-yellow-500 text-white px-3 py-1 rounded">
                      Edit
                    </button>
                    <button class="bg-red-600 text-white px-3 py-1 rounded">
                      Hapus
                    </button>
                  </td>
                </tr>

                <tr class="border-b">
                  <td class="p-3">20211004</td>
                  <td class="p-3">bagas</td>
                  <td class="p-3 space-x-2">
                    <button class="bg-yellow-500 text-white px-3 py-1 rounded">
                      Edit
                    </button>
                    <button class="bg-red-600 text-white px-3 py-1 rounded">
                      Hapus
                    </button>
                  </td>
                </tr>

                <tr class="border-b">
                  <td class="p-3">20211005</td>
                  <td class="p-3">putri</td>
                  <td class="p-3 space-x-2">
                    <button class="bg-yellow-500 text-white px-3 py-1 rounded">
                      Edit
                    </button>
                    <button class="bg-red-600 text-white px-3 py-1 rounded">
                      Hapus
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- FOOTER -->
        <div class="text-center text-sm text-gray-500 pb-4">
          © 2025 Admin Dashboard. All rights reserved.
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div
      id="modal"
      class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center"
    >
      <div class="bg-white rounded-lg shadow-lg w-96">
        <div class="flex justify-between items-center border-b px-5 py-3">
          <h3 class="font-semibold text-lg">Tambah Mahasiswa</h3>
          <button onclick="closeModal()">✕</button>
        </div>

        <div class="p-5">
          <label class="text-sm">NIM</label>
          <input class="w-full border rounded p-2 mb-4 mt-1" />

          <label class="text-sm">Nama</label>
          <input class="w-full border rounded p-2" />
        </div>

        <div class="flex justify-end gap-3 p-4 border-t">
          <button
            onclick="closeModal()"
            class="bg-gray-400 text-white px-4 py-2 rounded"
          >
            Batal
          </button>

          <button class="bg-blue-600 text-white px-4 py-2 rounded">
            Simpan
          </button>
        </div>
      </div>
    </div>

    <script>
      function openModal() {
        document.getElementById("modal").classList.remove("hidden");
        document.getElementById("modal").classList.add("flex");
      }

      function closeModal() {
        document.getElementById("modal").classList.add("hidden");
      }
    </script>
  </body>
</html>
