<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <!-- Card -->
    <div class="bg-white w-96 p-8 rounded-xl shadow-lg">
      <!-- Title -->
      <h1 class="text-center text-2xl font-bold text-blue-600 mb-6">Login</h1>

      <form>
        <!-- Email -->
        <label class="text-sm font-medium text-gray-700"> Email </label>

        <input
          type="email"
          placeholder="Masukkan email"
          class="w-full mt-1 mb-4 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <!-- Password -->
        <label class="text-sm font-medium text-gray-700"> Password </label>

        <input
          type="password"
          placeholder="Masukkan password"
          class="w-full mt-1 mb-4 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <!-- Remember & Forgot -->
        <div class="flex justify-between items-center text-sm mb-4">
          <label class="flex items-center gap-2 text-gray-600">
            <input type="checkbox" class="accent-blue-600" />
            Ingat saya
          </label>

          <a href="#" class="text-blue-500 hover:underline"> Lupa password? </a>
        </div>

        <!-- Button -->
        <button
          class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition"
        >
          Login
        </button>

        <!-- Register -->
        <p class="text-center text-sm text-gray-600 mt-4">
          Belum punya akun?
          <a href="#" class="text-blue-500 hover:underline">Daftar</a>
        </p>
      </form>
    </div>
  </body>
</html>
